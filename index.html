                {movs.length===0 && <tr><td colSpan={4} className="empty" style={{padding:24}}>Nessun movimento.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        <div className="modal-foot"><button className="btn" onClick={onClose}>Chiudi</button></div>
      </div>
    </div>
  );
}

function Resoconto({db, update, flash, period}){
  const [year,setYear]=useState((period||curPeriod()).slice(0,4));
  const [histTenant,setHistTenant]=useState(null);
  const alloc=useMemo(()=> db.tenants.map(t=>{ const ch=db.charges.filter(c=>c.tenantId===t.id); const pa=db.payments.filter(p=>p.tenantId===t.id && !p.deposit); return {t, ...allocateTenant(ch,pa)}; }), [db.charges,db.payments,db.tenants]);
  const inYear=(p)=> p && p.slice(0,4)===year;
  const months=Array.from({length:12},(_,i)=>`${year}-${String(i+1).padStart(2,"0")}`);
  const monthData=months.map(m=>{ let atteso=0,inc=0; alloc.forEach(a=>a.charges.forEach(c=>{ if(c.period===m){ atteso+=c.amount; inc+=c.paid; } })); return {m,atteso,inc,out:Math.round((atteso-inc)*100)/100}; });
  const yAtteso=monthData.reduce((a,x)=>a+x.atteso,0), yInc=monthData.reduce((a,x)=>a+x.inc,0);
  const maxM=Math.max(1,...monthData.map(x=>x.atteso));
  const perBuilding=db.buildings.map(b=>{ let atteso=0,inc=0; alloc.forEach(a=>{ if(a.t.buildingId!==b.id)return; a.charges.forEach(c=>{ if(inYear(c.period)){ atteso+=c.amount; inc+=c.paid; } }); }); return {b,atteso,inc}; }).filter(x=>x.atteso>0||x.inc>0);
  const perTenant=alloc.map(a=>{ let atteso=0,inc=0; a.charges.forEach(c=>{ if(inYear(c.period)){ atteso+=c.amount; inc+=c.paid; } }); return {t:a.t,atteso,inc,saldo:Math.round((inc-atteso)*100)/100}; }).filter(x=>x.atteso>0||x.inc>0).sort((a,b)=>a.saldo-b.saldo);
  const years=Array.from(new Set(db.charges.map(c=>(c.period||"").slice(0,4)).filter(Boolean))).sort();
  if(!years.includes(year)&&years.length) years.push(year);
  const exportCsv=()=>{ const rows=[["Inquilino","Immobile","Atteso","Incassato","Saldo"]]; perTenant.forEach(x=>rows.push([x.t.name, db.buildings.find(b=>b.id===x.t.buildingId)?.name||"", x.atteso.toFixed(2).replace(".",","), x.inc.toFixed(2).replace(".",","), x.saldo.toFixed(2).replace(".",",")])); const csv="\ufeff"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\r\n"); const blob=new Blob([csv],{type:"text/csv"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="resoconto-"+year+".csv"; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); };

  return (
    <div>
      <div className="section-head"><span className="eyebrow">Analisi</span><h2>Resoconto annuo</h2><div className="spacer"></div>
        <select className="inp num" style={{width:"auto"}} value={year} onChange={e=>setYear(e.target.value)}>{(years.length?years:[year]).map(y=><option key={y} value={y}>{y}</option>)}</select>
        <button className="btn" onClick={exportCsv}>Esporta CSV</button>
      </div>

      <div className="stat-row">
        <div className="stat"><div className="k">Atteso {year}</div><div className="v num">{eur(yAtteso)}</div></div>
        <div className="stat"><div className="k">Incassato {year}</div><div className="v num pos">{eur(yInc)}</div></div>
        <div className="stat"><div className="k">Da incassare</div><div className={"v num"+((yAtteso-yInc)>0.01?" neg":"")}>{eur(Math.round((yAtteso-yInc)*100)/100)}</div></div>
        <div className="stat"><div className="k">Tasso incasso</div><div className="v num">{yAtteso>0?Math.round(yInc/yAtteso*100):0}%</div></div>
        <div className="stat"><div className="k">Cauzioni trattenute</div><div className="v num" style={{color:"var(--brand)"}}>{eur(Math.round(db.payments.filter(p=>p.deposit).reduce((a,p)=>a+p.amount,0)*100)/100)}</div></div>
      </div>

      <div className="card card-pad" style={{marginBottom:16}}>
        <div className="eyebrow" style={{marginBottom:12}}>Andamento mensile {year}</div>
        {monthData.map(x=>(
          <div key={x.m} style={{display:"grid",gridTemplateColumns:"42px 1fr 150px",gap:12,alignItems:"center",padding:"5px 0"}}>
            <div className="muted" style={{fontSize:12,textTransform:"capitalize"}}>{MONTHS[(+x.m.slice(5))-1].slice(0,3)}</div>
            <div className="meter" style={{height:14}}><i style={{width:(x.atteso>0?Math.min(100,x.inc/x.atteso*100):0)+"%",background:x.out>0.01?"var(--accent)":"var(--pos)"}}></i></div>
            <div className="num" style={{fontSize:12,textAlign:"right"}}>{eur(x.inc)} <span className="muted">/ {eur(x.atteso)}</span></div>
          </div>
        ))}
      </div>

      {perBuilding.length>0 && (
        <div className="card" style={{marginBottom:16}}>
          <table>
            <thead><tr><th>Immobile</th><th className="r">Atteso</th><th className="r">Incassato</th><th className="r">Da incassare</th></tr></thead>
            <tbody className="row-hover">
              {perBuilding.map(x=>(<tr key={x.b.id}><td><b>{x.b.name}</b></td><td className="r num">{eur(x.atteso)}</td><td className="r num pos">{eur(x.inc)}</td><td className="r num" style={{color:(x.atteso-x.inc)>0.01?"var(--neg)":"inherit"}}>{eur(Math.round((x.atteso-x.inc)*100)/100)}</td></tr>))}
            </tbody>
          </table>
        </div>
      )}

      <div className="section-head"><h3 style={{fontSize:15}}>Per inquilino — {year}</h3></div>
      <div className="card">
        <table>
          <thead><tr><th>Inquilino</th><th>Immobile</th><th className="r">Atteso</th><th className="r">Incassato</th><th className="r">Saldo</th><th></th></tr></thead>
          <tbody className="row-hover">
            {perTenant.map(x=>(
              <tr key={x.t.id}>
                <td><b>{x.t.name}</b></td>
                <td className="muted">{db.buildings.find(b=>b.id===x.t.buildingId)?.name||"—"}</td>
                <td className="r num">{eur(x.atteso)}</td>
                <td className="r num pos">{eur(x.inc)}</td>
                <td className="r"><span className={"chip "+(Math.abs(x.saldo)<0.01?"zero":x.saldo<0?"neg":"pos")}>{Math.abs(x.saldo)<0.01?"In pari":x.saldo<0?"Deve "+eur(-x.saldo):"Credito "+eur(x.saldo)}</span></td>
                <td className="r"><button className="btn sm ghost" onClick={()=>setHistTenant(x.t)}>Storico</button></td>
              </tr>
            ))}
            {perTenant.length===0 && <tr><td colSpan={6} className="empty" style={{padding:24}}>Nessun dato per il {year}.</td></tr>}
          </tbody>
        </table>
      </div>

      {histTenant && <TenantHistoryModal db={db} update={update} tenant={histTenant} onClose={()=>setHistTenant(null)} flash={flash} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
